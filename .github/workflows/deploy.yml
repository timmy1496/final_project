name: "Build & Deploy Go App"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "k8s/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "latest"

env:
  AWS_REGION: "eu-central-1"
  ECR_REPOSITORY: "go-app-dev"
  EKS_CLUSTER_NAME: "go-app-dev-cluster"
  K8S_NAMESPACE: "app"

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Build & Push to ECR ────────────────────────────────────
  build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=git-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # не блокуємо, тільки репортуємо

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─── Deploy to EKS ──────────────────────────────────────────
  deploy:
    name: "Deploy to EKS"
    runs-on: ubuntu-latest
    needs: build
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set image tag in manifests
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:git-${{ github.sha }}"
          sed -i "s|<ECR_REPO_URL>/go-app-dev:latest|${IMAGE}|g" k8s/app/01-deployment.yml
          echo "Deploying image: ${IMAGE}"

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/app/ --namespace ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/go-app \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Get ALB URL
        run: |
          echo "Waiting for ALB..."
          sleep 30
          kubectl get ingress go-app -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
