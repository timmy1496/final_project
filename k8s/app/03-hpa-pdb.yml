---
# ─── HorizontalPodAutoscaler ────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-app
  namespace: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ─── PodDisruptionBudget ────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: go-app
  namespace: app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: go-app
